version: "3.9"

services:
  db:
    image: postgres:15
    container_name: sgc_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sgc_db}
      POSTGRES_USER: ${POSTGRES_USER:-sgc_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sgc_password}
    ports:
      - "5432:5432"
    volumes:
      - sgc_db_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sgc_app
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - .:/code
    command: >
      bash -c "uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  sgc_db_data:

